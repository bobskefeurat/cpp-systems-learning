schema_version: v0
record_kind: pedagogical_mapping

mapping_id: M-001
target_program: cpp-systems-learning
source_ids:
  - S-001
assumptions:
  - The source is being integrated first as an authoring backbone, not as a default learner runtime resource.
  - Early phases may still require more beginner-friendly companion resources.
  - The extraction currently covers chapters 1-29 of the published course index.
  - Chapter 1 is retained as orientation and source-context material, may inform course-framing and optional reading packets, and is intentionally excluded from phase and gate generation.

