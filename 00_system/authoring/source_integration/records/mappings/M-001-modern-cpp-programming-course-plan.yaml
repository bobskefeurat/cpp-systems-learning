global_gaps:
  - The source remains link-only until licensing and reuse status are clarified.
  - The course assumes prior C and OOP familiarity, so learner-facing use still requires curated companion reading.
  - If Chapter 1 is exposed learner-facing, it should be wrapped in a short optional orientation packet rather than used raw.
  - Numeric semantics, callables, and dynamic object-model topics need better learner-facing companion sources before automatic gate generation should rely on them.
  - Later object-model topics such as RTTI and object layout remain out of scope for automatic generation in this pilot.
  - Templates, translation units, libraries, and ABI topics currently need new curated companion resources before learner-facing rollout.
  - Style/tooling, STL, concurrency, performance, design, binary-size, and build-time topics all still need curated learner-facing packets before runtime use.
  - Later phases will need explicit environment baselines and local artifacts so generated tasks stay observable and comparable.

